per_listener_settings false
allow_anonymous false
persistence true
persistence_location /mosquitto/data/
log_dest stdout

listener 8883 0.0.0.0
cafile /mosquitto/runtime/certs/ca.crt
certfile /mosquitto/runtime/certs/server.crt
keyfile /mosquitto/runtime/certs/server.key
require_certificate false
tls_version tlsv1.2

plugin /mosquitto/runtime/plugins/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/runtime/dynamic-security.json
plugin_opt_password_init_file /mosquitto/runtime/admin-password.txt
